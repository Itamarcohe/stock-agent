<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Agent Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 20px; font-weight: 600; color: #58a6ff; }

    #last-updated {
      font-size: 13px;
      color: #8b949e;
    }

    .container { padding: 32px; }

    h2 {
      font-size: 15px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    /* STOCK CARDS */
    .stocks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .stock-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.2s;
    }

    .stock-card:hover { border-color: #58a6ff; }

    .stock-symbol {
      font-size: 18px;
      font-weight: 700;
      color: #e6edf3;
      margin-bottom: 8px;
    }

    .stock-price {
      font-size: 26px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }

    .stock-change {
      font-size: 14px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      display: inline-block;
    }

    .positive { background: #1a3a2a; color: #3fb950; }
    .negative { background: #3a1a1a; color: #f85149; }

    .stock-volume {
      font-size: 12px;
      color: #8b949e;
      margin-top: 8px;
    }

    .stock-time {
      font-size: 11px;
      color: #484f58;
      margin-top: 4px;
    }

    /* NEWS */
    .news-list { display: flex; flex-direction: column; gap: 12px; }

    .news-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 16px 20px;
      transition: border-color 0.2s;
    }

    .news-card:hover { border-color: #58a6ff; }

    .news-source {
      font-size: 11px;
      font-weight: 600;
      color: #58a6ff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .news-title {
      font-size: 15px;
      font-weight: 500;
      color: #e6edf3;
      margin-bottom: 6px;
      text-decoration: none;
      display: block;
    }

    .news-title:hover { color: #58a6ff; }

    .news-summary {
      font-size: 13px;
      color: #8b949e;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .news-time {
      font-size: 11px;
      color: #484f58;
    }

    /* REFRESH BUTTON */
    .refresh-btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }

    .refresh-btn:hover { background: #30363d; }

    .loading { color: #8b949e; font-size: 14px; padding: 20px 0; }
  </style>
</head>
<body>

<header>
  <h1>📈 Stock Agent</h1>
  <div style="display:flex; align-items:center; gap:16px;">
    <span id="last-updated">Loading...</span>
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</header>

<div class="container">
  <h2>Live Prices</h2>
  <div class="stocks-grid" id="stocks-grid">
    <div class="loading">Fetching prices...</div>
  </div>

  <h2>Latest News</h2>
  <div class="news-list" id="news-list">
    <div class="loading">Fetching news...</div>
  </div>
</div>

<script>
  const API = "http://localhost:8000";

  async function loadPrices() {
    const res = await fetch(`${API}/prices`);
    const data = await res.json();

    // get latest price per symbol
    const latest = {};
    data.forEach(p => {
      if (!latest[p.symbol]) latest[p.symbol] = p;
    });

    const grid = document.getElementById("stocks-grid");
    grid.innerHTML = "";

    Object.values(latest).forEach(p => {
      const isPositive = p.change_percent >= 0;
      const card = document.createElement("div");
      card.className = "stock-card";
      card.innerHTML = `
        <div class="stock-symbol">${p.symbol}</div>
        <div class="stock-price">$${p.price.toFixed(2)}</div>
        <span class="stock-change ${isPositive ? 'positive' : 'negative'}">
          ${isPositive ? '+' : ''}${p.change_percent.toFixed(2)}%
        </span>
        <div class="stock-volume">Vol: ${p.volume.toLocaleString()}</div>
        <div class="stock-time">${new Date(p.timestamp).toLocaleTimeString('he-IL')}</div>
      `;
      grid.appendChild(card);
    });
  }

  async function loadNews() {
    const res = await fetch(`${API}/news`);
    const data = await res.json();

    const list = document.getElementById("news-list");
    list.innerHTML = "";

    if (data.length === 0) {
      list.innerHTML = '<div class="loading">No news yet — check back in a few minutes.</div>';
      return;
    }

    data.slice(0, 20).forEach(n => {
      const card = document.createElement("div");
      card.className = "news-card";
      card.innerHTML = `
        <div class="news-source">${n.source}</div>
        <a class="news-title" href="${n.url}" target="_blank">${n.title}</a>
        <div class="news-summary">${n.summary}</div>
        <div class="news-time">${new Date(n.timestamp).toLocaleString('he-IL')}</div>
      `;
      list.appendChild(card);
    });
  }

  async function loadAll() {
    await Promise.all([loadPrices(), loadNews()]);
    document.getElementById("last-updated").textContent =
      "Updated: " + new Date().toLocaleTimeString('he-IL');
  }

  // load on start, then every 30 seconds
  loadAll();
  setInterval(loadAll, 30000);
</script>

</body>
</html>
